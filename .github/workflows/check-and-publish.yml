name: Check and Publish Docker Images

on:
  schedule:
    - cron: "0 0 */2 * *" # Run every 2nd day
  workflow_dispatch: # Allow manual triggering

env:
  IMAGE_NAME: ${{ github.repository_owner }}/pelican-panel

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get version
        id: version
        run: |
          # Get latest Pelican Panel version
          LATEST_PELICAN_PANEL=$(curl -s "https://api.github.com/repos/pelican-dev/panel/releases/latest" | jq -r '.tag_name' | sed 's/^v//')
          echo "latest_pelican_panel=$LATEST_PELICAN_PANEL" >> $GITHUB_OUTPUT

          # Get current versions from git tags
          CURRENT_PELICAN_PANEL=$(git tag -l | sort -V | tail -n1)

          # Set defaults if no tags exist
          CURRENT_PELICAN_PANEL="${CURRENT_PELICAN_PANEL:-0.0.0}"

          echo "current_pelican_panel=${CURRENT_PELICAN_PANEL}" >> $GITHUB_OUTPUT

          echo "Pelican Panel: ${CURRENT_PELICAN_PANEL} -> ${LATEST_PELICAN_PANEL}"

      - name: Check if update needed
        id: check
        run: |
          PELICAN_PANEL_UPDATED=false

          if [ "${{ steps.version.outputs.current_pelican_panel }}" != "${{ steps.version.outputs.latest_pelican_panel }}" ]; then
            PELICAN_PANEL_UPDATED=true
            echo "Pelican Panel needs to be updated"
          else
            echo "Pelican Panel is up to date"
          fi

          echo "pelican_panel_updated=${PELICAN_PANEL_UPDATED}" >> $GITHUB_OUTPUT

      - name: Build and push Pelican Panel
        if: steps.check.outputs.pelican_panel_updated == 'true'
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            PELICAN_PANEL_TAG=${{ steps.version.outputs.latest_pelican_panel }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.latest_pelican_panel }}
            ${{ env.IMAGE_NAME }}:latest
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true

      - name: Create and push tags
        if: steps.check.outputs.pelican_panel_updated == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Create Pelican Panel tag if updated
          if [ "${{ steps.check.outputs.pelican_panel_updated }}" = "true" ]; then
            git tag -a "${{ steps.version.outputs.latest_pelican_panel }}" -m "Pelican Panel version ${{ steps.version.outputs.latest_pelican_panel }}"
          fi

          # Push all tags
          git push origin --tags
