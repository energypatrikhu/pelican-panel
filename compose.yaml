services:
  panel:
    build: .
    container_name: pelican-panel
    restart: unless-stopped
    user: 0:0
    networks:
      - pelican
    env_file:
      - .env
    volumes:
      - ./data/panel/data:/pelican-data
      - ./data/panel/logs:/var/www/html/storage/logs
    healthcheck:
      test: ["CMD", "curl", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  pelican:
    name: pelican
    driver_opts:
      com.docker.network.bridge.name: pelican
